<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
</head>
<body>
    <h1>Currency Converter (EUR to INR)</h1>
    
    <!-- Input amount (Project 4 / Project 2) -->
    <label for="amount">Amount in EUR: </label>
    <input type="number" id="amount" placeholder="Enter amount">
    
    <!-- Button (Project 1) -->
    <button id="convertBtn">Convert</button>
    
    <!-- Result and Status displays -->
    <h3 id="result">Total in INR: 0</h3>
    <p>Conversion Count: <span id="count">0</span></p> <!-- Counter (Project 3) -->
    <p id="status"></p> <!-- Status loader (Project 5) -->

    <script src="script.js"></script>
</body>
</html>
